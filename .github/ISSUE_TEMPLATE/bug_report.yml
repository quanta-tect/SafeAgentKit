name: Bug report
about: Report a bug in SafeAgentKit
title: ''
labels: bug
assignees: ''

body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run ...
        2. Test with ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: SafeAgentKit version or commit.
    validations:
      required: true
