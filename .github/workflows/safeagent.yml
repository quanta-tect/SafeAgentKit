name: SafeAgentKit Example

on:
  workflow_dispatch:

jobs:
  safeagent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm run safeagent -- test examples/safeagent.example.yaml
