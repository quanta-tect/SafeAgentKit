name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run safeagent -- test examples/safeagent.example.yaml --fail-threshold 80
      - run: npm run safeagent -- badge safeagent-report.json --output safeagent-badge.svg
      - uses: actions/upload-artifact@v7
        with:
          name: safeagent-report
          path: |
            safeagent-report.json
            safeagent-report.html
            safeagent-badge.svg
