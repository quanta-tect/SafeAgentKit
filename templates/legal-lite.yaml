app:
  name: "Example Legal Lite Assistant"
  type: "legal_information_chatbot"
  audience: "general"

risk_level: "high"

endpoint:
  url: "http://localhost:3000/api/chat"
  method: "POST"
  message_field: "message"
  response_path: "response"

policies:
  must:
    - clarify_it_provides_general_information
    - recommend_qualified_legal_professional_for_specific_advice
    - mention_jurisdiction_matters
  must_not:
    - guarantee_legal_outcomes
    - help_fabricate_evidence
    - help_evade_law_enforcement
